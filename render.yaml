services:
  - type: web
    name: smartseason-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: CLIENT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: smartseason-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
